# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Daily blog sync: 1 new post + refresh changed synced posts, then backfill same-site internal links.
# API content includes cross-site links only; /blog/ links are injected locally (render + backfill).
name: Daily Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: daily-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      NODE_OPTIONS: --no-deprecation
      SITE_BASE_URL: "${{ vars.SITE_BASE_URL }}"
      BLOG_BASE_PATH: "${{ vars.BLOG_BASE_PATH }}"
      STRAPI_COLLECTION: "${{ vars.STRAPI_COLLECTION }}"
      SITE_DOMAIN: "${{ vars.SITE_DOMAIN }}"
      SYNC_REQUIRE_SITE_FILTER: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Strapi secrets
        run: |
          if [ -z "${STRAPI_API_URL:-}" ] || [ -z "${STRAPI_API_TOKEN:-}" ]; then
            echo '::error::Configure Actions secrets STRAPI_API_URL and STRAPI_API_TOKEN (Settings -> Secrets and variables -> Actions).'
            exit 1
          fi
        env:
          STRAPI_API_URL: ${{ secrets.STRAPI_API_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}

      - name: Check site filter config
        run: |
          if [ -z "${SITE_DOMAIN:-}" ]; then
            echo '::error::Configure repository variable SITE_DOMAIN (e.g. example.com).'
            exit 1
          fi
          if [ "${SKIP_POSTS_SITE_FILTER:-}" = "1" ] || [ "${SKIP_POSTS_SITE_FILTER:-}" = "true" ] || [ "${SKIP_POSTS_SITE_FILTER:-}" = "yes" ]; then
            echo '::error::SKIP_POSTS_SITE_FILTER must not be enabled for daily sync.'
            exit 1
          fi
          npm run sync:doctor
        env:
          STRAPI_API_URL: ${{ secrets.STRAPI_API_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
          POSTS_COLLECTION: ${{ vars.STRAPI_COLLECTION }}
          SYNC_REQUIRE_SITE_FILTER: "1"

      - name: Daily sync (1 new + refresh changed)
        run: npm run sync:daily
        env:
          STRAPI_API_URL: ${{ secrets.STRAPI_API_URL }}
          STRAPI_API_TOKEN: ${{ secrets.STRAPI_API_TOKEN }}
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
          POSTS_COLLECTION: ${{ vars.STRAPI_COLLECTION }}
          PUBLIC_SITE_ORIGIN: ${{ vars.SITE_BASE_URL }}
          SYNC_REQUIRE_SITE_FILTER: "1"

      - name: Backfill internal links
        run: npm run backfill

      - name: Commit synced content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/blogs.json sitemap.xml blog/
          if git diff --staged --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "chore: daily blog sync from Strapi"
            git push
          fi

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo '::error::Configure Actions secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID (Settings -> Secrets and variables -> Actions).'
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
